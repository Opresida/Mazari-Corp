kind = "web"
previewPath = "/"
title = "Mazari Corp"
version = "1.0.0"
id = "artifacts/mazari-corp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25081

[services.development]
run = "pnpm --filter @workspace/mazari-corp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mazari-corp", "run", "build" ]
publicDir = "artifacts/mazari-corp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25081"
BASE_PATH = "/"
